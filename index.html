<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shobi Placiente Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f9f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            width: 350px;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            text-align: center;
        }

        /* Profile Picture with your Pinterest image */
        .profile-pfp {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            border-radius: 50%;
            /* Using the direct source link for the Pinterest image */
            background-image: url('https://i.pinimg.com'); 
            background-size: cover;
            background-position: center;
            border: 4px solid #fff;
            box-shadow: 0 0 0 2px #a8e6cf, 0 8px 20px rgba(168, 230, 207, 0.5);
            transition: transform 0.3s ease;
        }
        
        .profile-pfp:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 26px;
            margin-bottom: 8px;
            color: #2d3436;
        }

        .anim-container {
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        #text-display {
            font-size: 15px;
            color: #636e72;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #81c784;
            width: 0;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        @keyframes blink {
            50% { border-color: transparent }
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid #e8f5e9;
            padding-top: 25px;
            margin-bottom: 30px;
        }
        .stat-box {
            display: flex;
            flex-direction: column;
        }
        .label {
            font-size: 10px;
            text-transform: uppercase;
            color: #99aab5;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .val {
            font-weight: 700;
            font-size: 14px;
            color: #2d3436;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .social-btn {
            flex: 1;
            padding: 12px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s ease;
            border: 2px solid #a8e6cf;
            color: #558b2f;
            background-color: transparent;
        }
        .social-btn:hover {
            background-color: #a8e6cf;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-pfp"></div>
    <h1>Shobi Placiente</h1>
    
    <div class="anim-container">
        <div id="text-display"></div>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <span class="label">Year</span>
            <span class="val">2012</span>
        </div>
        <div class="stat-box">
            <span class="label">Likes</span>
            <span class="val">1.2M</span>
        </div>
        <div class="stat-box">
            <span class="label">Location</span>
            <span class="val" style="font-size: 11px;">St. Petersburg, RU</span>
        </div>
        <div class="stat-box">
            <span class="label">View</span>
            <span class="val">398</span>
        </div>
    </div>

    <div class="button-group">
        <a href="https://facebook.com" target="_blank" class="social-btn">Facebook</a>
        <a href="https://pinterest.com" target="_blank" class="social-btn">Pinterest</a>
    </div>
</div>

<script>
    const phrases = [
        "white nights",
        "magiging successful para kay mama.",
        "oh, fyodor, kafka, sylvia.",
        "whehehehe"
    ];
    let currentIdx = 0;
    const el = document.getElementById('text-display');

    function animateText() {
        const text = phrases[currentIdx];
        el.textContent = text;
        el.style.width = '0';
        el.style.animation = 'none'; 
        el.offsetHeight; 
        el.style.animation = `typing 4s steps(${text.length}) forwards, blink 0.8s infinite`;
        
        setTimeout(() => {
            currentIdx = (currentIdx + 1) % phrases.length;
            animateText();
        }, 6000); 
    }

    animateText();
</script>

</body>
</html>
